name: qap

services:
  qap-db:
    image: agnohq/pgvector:18
    container_name: qap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "0.0.0.0:5432:5432"   # LAN-accessible
    networks:
      - qap-net

  qap-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qap-api
    user: root
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"   # LAN-accessible
    volumes:
      # Hot-reload: mount source code
      - .:/app
      # Generated code volume
      - generated_code:/app/generated
      # Docker socket — required for `docker mcp gateway run` (Docker MCP Gateway)
      # Only active when DOCKER_MCP_PROFILE is set in .env
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - PYTHONPATH=/app
      - AGENTOS_URL=http://127.0.0.1:8000
      # Database
      - DB_HOST=qap-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ai}
      - DB_PASS=${DB_PASS:-ai}
      - DB_DATABASE=${DB_DATABASE:-ai}
      - WAIT_FOR_DB=True
      - PRINT_ENV_ON_LOAD=${PRINT_ENV_ON_LOAD:-False}
      # LLM / Inference (Kilo AI Gateway — OpenRouter-compatible)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-anonymous}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://api.kilo.ai/api/openrouter/v1}
      - KILO_API_KEY=${KILO_API_KEY:-anonymous}
      - KILO_API_URL=${KILO_API_URL:-https://api.kilo.ai}
      # Ollama (local embeddings via host machine)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      # GitHub (Engineer agent — PR creation + GitHub MCP tools)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # AUT (Application Under Test — GDS Demo App)
      - AUT_BASE_URL=${AUT_BASE_URL:-https://lokeshsharma99.github.io/GDS-Demo-App/}
      - AUT_AUTH_USER=${AUT_AUTH_USER:-}
      - AUT_AUTH_PASS=${AUT_AUTH_PASS:-}
      # AUT GitHub repo — used by GitHub MCP tools
      - AUT_GITHUB_OWNER=${AUT_GITHUB_OWNER:-lokeshsharma99}
      - AUT_GITHUB_REPO=${AUT_GITHUB_REPO:-GDS-Demo-App}
      - AUT_PRODUCTION_URL=${AUT_PRODUCTION_URL:-https://lokeshsharma99.github.io/GDS-Demo-App/}
      - AUT_ALLURE_REPORT_URL=${AUT_ALLURE_REPORT_URL:-https://lokeshsharma99.github.io/GDS-Demo-App/allure-report/}
      - AUT_GITHUB_PROJECT_URL=${AUT_GITHUB_PROJECT_URL:-https://github.com/users/lokeshsharma99/projects/6/views/1}
      - AUT_SONARCLOUD_URL=${AUT_SONARCLOUD_URL:-https://sonarcloud.io/summary/overall?id=lokeshsharma99_GDS-Demo-App&branch=main}
      # Jira (Architect agent — ticket parsing)
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      # Atlassian MCP (Rovo MCP Server — Jira + Confluence tools via atlassian_mcp.py)
      - ATLASSIAN_URL=${ATLASSIAN_URL:-}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL:-}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      # Azure DevOps (optional alternative to Jira)
      - AZURE_DEVOPS_URL=${AZURE_DEVOPS_URL:-}
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT:-}
      - AZURE_DEVOPS_EXT_PAT=${AZURE_DEVOPS_EXT_PAT:-}
      - AZURE_DEVOPS_EMAIL=${AZURE_DEVOPS_EMAIL:-}
      # @azure-devops/mcp v2.7+ reads PERSONAL_ACCESS_TOKEN for PAT auth
      - PERSONAL_ACCESS_TOKEN=${AZURE_DEVOPS_EXT_PAT:-}
      # MCP Servers — HTTP endpoints pointing at dedicated MCP Docker services
      - GITHUB_MCP_URL=http://github-mcp:8080
      - PLAYWRIGHT_MCP_URL=http://playwright-mcp:8931
      - ADO_MCP_URL=http://ado-mcp:8932/mcp
      - ATLASSIAN_MCP_URL=http://atlassian-mcp:8933/mcp
      # Docker MCP Gateway — set profile name to activate (e.g. "default")
      # Requires Docker socket mount below. Leave blank to use npx fallback.
      - DOCKER_MCP_PROFILE=${DOCKER_MCP_PROFILE:-}
      # Optional
      - EXA_API_KEY=${EXA_API_KEY:-}
      - PARALLEL_API_KEY=${PARALLEL_API_KEY:-}
    depends_on:
      - qap-db
      - github-mcp
      - playwright-mcp
      - ado-mcp
      - atlassian-mcp
    networks:
      - qap-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # GitHub MCP Server  (GitHub tools for Architect, Discovery, Engineer, Detective)
  # HTTP mode — connects to ghcr.io/github/github-mcp-server via streamable-HTTP
  # ---------------------------------------------------------------------------
  github-mcp:
    image: ghcr.io/github/github-mcp-server
    container_name: github-mcp
    command:
      - http
      - --port=8080
      - --toolsets=repos,issues,pull_requests,actions,discussions,git,users
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - qap-net

  # ---------------------------------------------------------------------------
  # Azure DevOps MCP Server  (ADO tools via supergateway SSE proxy)
  # @azure-devops/mcp only supports stdio; supergateway wraps it as SSE on :8932
  # PERSONAL_ACCESS_TOKEN is computed at startup: base64(email:pat)
  # ---------------------------------------------------------------------------
  ado-mcp:
    image: node:22-alpine
    container_name: ado-mcp
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PERSONAL_ACCESS_TOKEN=$$(printf '%s:%s' "$$AZURE_DEVOPS_EMAIL" "$$AZURE_DEVOPS_EXT_PAT" | base64 | tr -d '\n')
        ORG=$$(echo "$$AZURE_DEVOPS_URL" | sed 's|.*dev.azure.com/||' | cut -d/ -f1)
        ORG=$${ORG:-QEA}
        exec npx -y supergateway \
          --stdio "npx -y @azure-devops/mcp $$ORG --authentication pat -d core pipelines repositories work-items" \
          --outputTransport streamableHttp \
          --streamableHttpPath /mcp \
          --port 8932
    environment:
      - AZURE_DEVOPS_URL=${AZURE_DEVOPS_URL:-}
      - AZURE_DEVOPS_EMAIL=${AZURE_DEVOPS_EMAIL:-}
      - AZURE_DEVOPS_EXT_PAT=${AZURE_DEVOPS_EXT_PAT:-}
    ports:
      - "8932:8932"
    networks:
      - qap-net

  # ---------------------------------------------------------------------------
  # Atlassian MCP Server  (Jira + Confluence — sooperset/mcp-atlassian)
  # https://github.com/sooperset/mcp-atlassian
  # 72 Jira + Confluence tools via streamable-HTTP on :8933/mcp
  # Auth: JIRA_USERNAME + JIRA_API_TOKEN (standard API token — no org-admin needed)
  # ---------------------------------------------------------------------------
  atlassian-mcp:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    container_name: atlassian-mcp
    restart: unless-stopped
    command: --transport streamable-http --port 8933 --stateless
    environment:
      # Map ATLASSIAN_* vars from .env to the names mcp-atlassian expects
      - JIRA_URL=${ATLASSIAN_URL:-}
      - JIRA_USERNAME=${ATLASSIAN_EMAIL:-}
      - JIRA_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
      - CONFLUENCE_URL=${ATLASSIAN_CONFLUENCE_URL:-}
      - CONFLUENCE_USERNAME=${ATLASSIAN_EMAIL:-}
      - CONFLUENCE_API_TOKEN=${ATLASSIAN_API_TOKEN:-}
    ports:
      - "8933:8933"
    networks:
      - qap-net

  # ---------------------------------------------------------------------------
  # Playwright MCP Server  (browser automation for Discovery + Medic agents)
  # ---------------------------------------------------------------------------
  playwright-mcp:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: playwright-mcp
    # Install playwright-managed Chromium (the --browser chromium distribution),
    # then start the MCP server. Both must use the same distribution name.
    command: >-
      sh -c "npx -y @playwright/mcp@latest install-browser chromium;
             npx -y @playwright/mcp@latest --port 8931 --host 0.0.0.0 --allowed-hosts '*' --browser chromium"
    restart: unless-stopped
    ports:
      - "8931:8931"
    volumes:
      - playwright-mcp-browsers:/root/.cache/ms-playwright
    networks:
      - qap-net

  # ---------------------------------------------------------------------------
  # Quality Autopilot Control Plane  (Next.js UI — port 3000)
  # ---------------------------------------------------------------------------
  qap-ui:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: qap-ui
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"   # LAN-accessible
    environment:
      # NEXT_PUBLIC_AGENTOS_URL is a build-time Next.js var — not effective here.
      # The UI auto-detects the backend at window.location.hostname:8000 at runtime.
      - NEXT_PUBLIC_OS_SECURITY_KEY=${NEXT_PUBLIC_OS_SECURITY_KEY:-}
    depends_on:
      - qap-api
    networks:
      - qap-net

  # ---------------------------------------------------------------------------
  # Playwright Test Runner  (sandboxed execution for automation/ tests)
  # Start with: docker compose --profile runner up -d
  # ---------------------------------------------------------------------------
  qap-playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: qap-playwright
    working_dir: /tests
    volumes:
      - ./test-output:/tests
    network_mode: "none"
    profiles:
      - runner

networks:
  qap-net:

volumes:
  pgdata:
  generated_code:
  playwright-mcp-browsers:  # caches chrome-for-testing download across container restarts
