# SonarQube Project Configuration — Quality Autopilot Automation Framework
# ============================================================================
# Run a scan:
#   npm run sonar:scan               (from automation/)
#   docker compose --profile sonar up -d && npm run sonar:scan
#
# Required env vars:
#   SONAR_URL   — SonarQube server URL  (default: http://localhost:9000)
#   SONAR_TOKEN — Project analysis token (generate in SonarQube UI)
# ============================================================================

sonar.projectKey=quality-autopilot-automation
sonar.projectName=Quality Autopilot — Automation Framework
sonar.projectVersion=1.0

# Source files to analyse
sonar.sources=pages,step_definitions,helpers,hooks,fixtures
sonar.tests=features,technical-tests

# TypeScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions — vendor code and build artefacts
sonar.exclusions=node_modules/**,dist/**,reports/**,test-results/**,playwright-report/**

# Test report
sonar.testExecutionReportPaths=reports/sonar-test-report.xml

# Coverage
sonar.coverage.exclusions=**/*.spec.ts,**/fixtures/**,**/config/**

# Host (overridden by SONAR_URL env var at scan time)
sonar.host.url=${SONAR_URL:-http://localhost:9000}
